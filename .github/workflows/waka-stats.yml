name: WakaTime Stats Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4.2.2 or v4 depends on what the runner matches, but if v4 still throws it, we use the specific sub-version
      - uses: actions/checkout@v4

      # Switched from @master to a pinned stable version if available, 
      # or you can leave it as @master since the warning is coming specifically from actions/checkout@v4 
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.WAKATIME_GH_TOKEN }} # Passes your working secret token
          SHOW_LINES_OF_CODE: false
          SHOW_PROFILE_VIEWS: false
          SHOW_COMMIT: false
          SHOW_DAYS_OF_WEEK: false
          SHOW_LANGUAGE: true
          SHOW_OS: true
          SHOW_EDITORS: true
          SHOW_SHORT_INFO: false
          SHOW_LOC_CHART: false
          SHOW_PROJECTS: false
          SHOW_TIMEZONE: false